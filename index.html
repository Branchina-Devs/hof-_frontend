<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hall of Fame — Branchina</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">I.T.S "Pietro Branchina"<br/>Archivio Digitale</div>
  <div class="masthead-center">
    <div class="masthead-title">Hall of Fame</div>
    <div class="masthead-subtitle">Raccolta dei Progetti Studenteschi</div>
  </div>
  <div class="masthead-right" id="mastheadRight">
    <img src="branchina_logo.png" alt="Branchina" class="masthead-logo"/>
  </div>
  <div class="masthead-rule"></div>
</header>

<div class="page">

  <aside class="col-left">
    <div class="col-label">Indice dei Progetti</div>
    <div id="projectList">
      <div class="state-loading-msg"><span class="loading-dots">Caricamento</span></div>
    </div>
  </aside>

  <main class="col-main" id="mainContent">
    <div class="state-placeholder">
      <div class="ornament">❧</div>
      <p>Selezionare un progetto dall'indice<br/>per visualizzarne il contenuto.</p>
    </div>
  </main>

  <aside class="col-right">
    <div class="col-label">Sommario</div>
    <ul class="index-list" id="indexList">
      <li style="font-family:var(--serif);font-style:italic;font-size:0.8rem;color:var(--ink3);padding:0.5rem 0;border:none;">—</li>
    </ul>
  </aside>

</div>

<script src="main.js"></script>
</body>
</html>
